<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채팅방</title>

<style>
*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    height:100%;
    display:flex;
    flex-direction:column;
    font-family:sans-serif;
    background:#fff;
}

header{
    padding:15px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    border-bottom:1px solid #ddd;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.message{
    margin-bottom:15px;
}

.message-text{
    background:#f0f0f0;
    padding:10px;
    border-radius:10px;
    display:inline-block;
}

.timestamp{
    font-size:12px;
    color:#888;
    margin-top:3px;
}

#inputBox{
    display:flex;
    gap:10px;
    padding:10px;
    border-top:1px solid #ddd;
}

#message{
    flex:1;
    padding:12px;
}

button{
    padding:12px;
}
</style>
</head>

<body>

<header id="roomTitle">채팅방</header>

<div id="chat"></div>

<div id="inputBox">

<input id="message" placeholder="메시지 입력"/>

<button onclick="sendMessage()">전송</button>

</div>

<script src="https://chat-iey5.onrender.com/socket.io/socket.io.js"></script>

<script>

console.log("ROOM ID:", roomId);

const socket = io("https://one23-9wul.onrender.com");

const roomId = localStorage.getItem("currentRoom");

// 방 입장 (중요)
socket.emit("joinRoom", roomId);

// 방 이름 표시
const rooms = JSON.parse(localStorage.getItem("rooms")) || [];
const room = rooms.find(r => r.id == roomId);

if(room){
    document.getElementById("roomTitle").textContent = room.name;
}

const chat = document.getElementById("chat");
const messageInput = document.getElementById("message");

function getTime(){
    return new Date().toLocaleTimeString([], {
        hour:"2-digit",
        minute:"2-digit"
    });
}

function sendMessage(){

    const msg = messageInput.value.trim();
    if(!msg) return;

    // ⭐ 핵심: roomId 반드시 포함
    socket.emit("chat message", {
        roomId: roomId,
        type: "text",
        content: msg,
        time: getTime()
    });

    messageInput.value = "";
}

// 메시지 받기
socket.on("chat message", (data) => {

    const div = document.createElement("div");
    div.className = "message";

    div.innerHTML = `
        <div class="message-text">${data.content}</div>
        <div class="timestamp">${data.time || ""}</div>
    `;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
});

// 엔터 전송
messageInput.addEventListener("keypress", (e) => {
    if(e.key === "Enter"){
        sendMessage();
    }
});

</script>

</body>
</html>
